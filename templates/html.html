<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; line-height: 1.7; color: #1a1a2e; }
  h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
  h2 { font-size: 1.6rem; margin-top: 2rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 0.3rem; }
  h3 { font-size: 1.3rem; margin-top: 1.5rem; }
  pre { background: #f5f5f5; padding: 1rem; border-radius: 6px; overflow-x: auto; }
  code { background: #f0f0f0; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
  pre code { background: none; padding: 0; }
  blockquote { border-left: 4px solid #ccc; margin: 0; padding-left: 1rem; color: #555; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { border: 1px solid #ddd; padding: 0.6rem; text-align: left; }
  th { background: #f5f5f5; }
  img { max-width: 100%; height: auto; border-radius: 8px; margin: 1rem 0; }
  .hero { width: 100%; border-radius: 12px; margin: 1rem 0 2rem; }
  .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: 0.85rem; color: #888; }
  .faq { margin: 1.5rem 0; }
  .faq q { font-weight: 600; display: block; margin-top: 1rem; }
  .tldr { background: #f8f9ff; padding: 1rem 1.5rem; border-radius: 8px; margin: 1rem 0; }
  @media (prefers-color-scheme: dark) {
    body { background: #0f0f1a; color: #e0e0f0; }
    h2 { border-bottom-color: #333; }
    pre, code { background: #1a1a2e; }
    blockquote { border-left-color: #555; color: #aaa; }
    th { background: #1a1a2e; }
    th, td { border-color: #333; }
    .tldr { background: #1a1a2e; }
    .footer { border-top-color: #333; }
  }
</style>
</head>
<body>
{{HERO_HTML}}
{{CONTENT}}
<div class="footer">
  <p>Generated by Blog Writer Agent</p>
</div>
</body>
</html>
